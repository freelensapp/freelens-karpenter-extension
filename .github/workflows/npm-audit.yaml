# Workflow summary:
# - Purpose: detect vulnerable dependencies and propose automatic fixes via PR.
# - Depends on: none.
# - Trigger:
#   - Scheduled: every day at 07:16 UTC, by GitHub Actions scheduler, to keep dependency security hygiene up to date.
#   - Comment command: on issue comments, by maintainers, to rerun when /rerun is posted on an "Automated npm audit" issue.
#   - Manual: via workflow_dispatch, by maintainers, to run an immediate audit/fix cycle on demand.
# - Steps:
#   - Checkout code and prepare Node.js/pnpm environment with cache.
#   - Install dependencies with retry.
#   - Run dependency vulnerability report and apply audit fixes.
#   - Build PR body from audit logs.
#   - Commit changes to automation branch and create/update PR, or close stale PR when no changes exist.
# - Docs:
#   - https://docs.npmjs.com/cli/v11/commands/npm-audit
#   - https://pnpm.io/cli/audit
#   - https://cli.github.com/manual/gh_pr

name: Automated npm audit

on:
  issue_comment:
    types:
      - created
  schedule:
    - cron: 16 7 * * *
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  npm-audit:
    name: npm audit

    runs-on: ubuntu-22.04
    environment: automated
    timeout-minutes: 10

    if: github.event_name != 'issue_comment' || (startsWith(github.event.issue.title, 'Automated npm audit') && contains(github.event.comment.body, '/rerun'))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Setup pnpm
        run: corepack enable

      - name: Get pnpm cache directory
        shell: bash
        run: echo "pnpm_cache_dir=$(pnpm store path)" >> ${GITHUB_ENV}

      - name: Use pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.pnpm_cache_dir }}
          key: ubuntu-22.04-x64-node-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ubuntu-22.04-x64-node-

      - name: Install pnpm dependencies
        id: install-pnpm
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile
        continue-on-error: true

      - name: Install pnpm dependencies (retry)
        if: steps.install-pnpm.outcome == 'failure'
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile

      - name: Run npm audit
        run: |
          set -o pipefail
          pnpm audit report 2>&1 | tee .github/report.log || true
          pnpm audit fix 2>&1 | tee .github/fix.log || true
          sed -e 's/\x1b\[[0-9;]*m//g' .github/report.log > .github/pr_body.log
          sed -e 's/\x1b\[[0-9;]*m//g' .github/fix.log >> .github/pr_body.log

      - name: Check for changes
        run: |
          if git diff --exit-code; then
            echo "changes=false" >> $GITHUB_ENV
          else
            echo "changes=true" >> $GITHUB_ENV
          fi

      - name: Commit and push to branch
        if: env.changes == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          default_author: github_actions
          message: Automated npm audit
          new_branch: automated/npm-audit
          push: origin automated/npm-audit --set-upstream --force

      - name: Create pull request
        if: env.changes == 'true'
        run: |-
          if [[ $(gh pr view automated/npm-audit --json state --jq .state || true) != "OPEN" ]]; then
            gh pr create \
              --head automated/npm-audit \
              --title "Automated npm audit" \
              --body-file .github/pr_body.log \
              --label automated
          else
            gh pr edit automated/npm-audit \
              --title "Automated npm audit" \
              --body-file .github/pr_body.log
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Close pull request
        if: env.changes == 'false'
        run: gh pr list --head automated/npm-audit --json number --jq '.[].number' | xargs -rn1 gh pr close --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
