# Workflow summary:
# - Purpose: create a release tag on main after an automated version PR is merged or explicitly approved.
# - Depends on: output from workflow "Automated npm version" (expects PR title prefix "Automated npm version").
# - Trigger:
#   - Automatic event: on closed pull requests targeting main, by GitHub Actions, to create a tag when an "Automated npm version" PR is merged.
#   - Comment command: on issue comments, by maintainers, to create a tag when /tag is posted on a closed "Automated npm version" issue.
# - Steps:
#   - Checkout main with full git history.
#   - Read the version from package.json.
#   - Verify the version is a stable release (X.Y.Z only).
#   - Create tag vX.Y.Z on the current main branch via GitHub API.
# - Docs:
#   - https://docs.github.com/rest/git/refs
#   - https://github.com/actions/github-script

name: Automated tag

on:
  issue_comment:
    types:
      - created
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:
  create-tag:
    name: tag

    runs-on: ubuntu-24.04
    environment: automated
    timeout-minutes: 10

    if: (startsWith(github.event.issue.title, 'Automated npm version') && github.event.issue.state == 'closed' && github.event.comment.body == '/tag') || (startsWith(github.event.pull_request.title, 'Automated npm version') && github.event.pull_request.merged)
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Get version from package.json
        id: package-json
        run: |
          echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Check if version is release
        id: check-version
        run: |
          if [[ "${{ steps.package-json.outputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag from the main branch
        if: steps.check-version.outputs.is_release == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const mainRef = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main',
            });
            const result = await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/v${{ steps.package-json.outputs.version }}',
              sha: mainRef.data.object.sha,
            });
            console.log(result);
          github-token: ${{ secrets.GH_TOKEN }}
