# Workflow summary:
# - Purpose: keep Trunk tooling and config up to date through automated pull requests.
# - Depends on: none.
# - Trigger:
#   - Scheduled: every day at 06:02 UTC, by GitHub Actions scheduler, to keep Trunk tooling updated.
#   - Automatic event: on push to main when files under .trunk/** change, by GitHub Actions, to align upgrades with config updates.
#   - Comment command: on issue comments, by maintainers, to rerun when /rerun is posted on an "Automated trunk upgrade" issue.
#   - Manual: via workflow_dispatch, by maintainers, to force an upgrade run on demand.
# - Steps:
#   - Checkout code and prepare Node.js/pnpm environment with cache.
#   - Install dependencies with retry.
#   - Run trunk upgrade and generate PR title/body metadata from output.
#   - Detect repository changes and optionally run Trunk checks.
#   - Commit updates to automation branch and create/update PR, or close stale PR when no changes exist.
# - Docs:
#   - https://docs.trunk.io/
#   - https://cli.github.com/manual/gh_pr

name: Automated trunk upgrade

on:
  issue_comment:
    types:
      - created
  push:
    branches:
      - main
    paths:
      - .trunk/**
  schedule:
    - cron: 2 6 * * *
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  trunk-upgrade:
    name: trunk upgrade

    runs-on: ubuntu-22.04
    environment: automated
    timeout-minutes: 10

    if: github.event_name != 'issue_comment' || (startsWith(github.event.issue.title, 'Automated trunk upgrade') && contains(github.event.comment.body, '/rerun'))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Setup pnpm
        run: corepack enable

      - name: Get pnpm cache directory
        shell: bash
        run: echo "pnpm_cache_dir=$(pnpm store path)" >> ${GITHUB_ENV}

      - name: Use pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.pnpm_cache_dir }}
          key: ubuntu-22.04-x64-node-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ubuntu-22.04-x64-node-

      - name: Install pnpm dependencies
        id: install-pnpm
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile
        continue-on-error: true

      - name: Install pnpm dependencies (retry)
        if: steps.install-pnpm.outcome == 'failure'
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile

      - name: Set up Trunk
        run: curl https://get.trunk.io -fsSL | bash -s -- -y

      - name: Trunk upgrade
        run: |
          set -o pipefail
          trunk upgrade --yes-to-all --no-progress --ci --color | tee .github/update.log
          sed -e '/Downloading Trunk/,/Unpacking Trunk... done/d' -e 's/\x1b\[[0-9;]*m//g' -e 's/^\(  \)\{0,1\}  /\1- /' .github/update.log > .github/pr_body.log
          perl -0777 -ne 'print join ", ", map {s/://gr} map {s/^- //r} grep {/^(-|cli) /} split "\n"' .github/pr_body.log > .github/pr_title.log

      - name: Check for changes
        run: |
          if git diff --exit-code; then
            echo "changes=false" >> $GITHUB_ENV
          else
            echo "changes=true" >> $GITHUB_ENV
          fi

      - name: Trunk Check
        if: env.changes == 'true'
        uses: trunk-io/trunk-action@v1
        with:
          check-mode: all
        continue-on-error: true

      - name: Commit and push to branch
        if: env.changes == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          default_author: github_actions
          message: Automated trunk upgrade [skip ci]
          new_branch: automated/trunk-upgrade
          fetch: false
          push: origin automated/trunk-upgrade --set-upstream --force

      - name: Create pull request
        if: env.changes == 'true'
        run: |-
          if [[ $(gh pr view automated/trunk-upgrade --json state --jq .state || true) != "OPEN" ]]; then
            gh pr create \
              --head automated/trunk-upgrade \
              --title "Automated trunk upgrade $(cat .github/pr_title.log) [skip ci]" \
              --body-file .github/pr_body.log \
              --label automated \
              --label trunk
          else
            gh pr edit automated/trunk-upgrade \
              --title "Automated trunk upgrade $(cat .github/pr_title.log) [skip ci]" \
              --body-file .github/pr_body.log
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Close pull request
        if: env.changes == 'false'
        run: gh pr list --head automated/trunk-upgrade --json number --jq '.[].number' | xargs -rn1 gh pr close --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
