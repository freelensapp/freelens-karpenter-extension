# Workflow summary:
# - Purpose: run Trunk checks to validate code quality and repository standards.
# - Depends on: none.
# - Trigger:
#   - Automatic event: on push to main and on every pull request, by GitHub Actions, to enforce code quality before/after changes.
#   - Manual: via workflow_dispatch, by maintainers, to run checks on demand.
# - Steps:
#   - Checkout the repository.
#   - Run Trunk checks in full mode.
# - Docs:
#   - https://docs.trunk.io/
#   - https://github.com/trunk-io/trunk-action

name: Trunk Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  trunk:
    name: Trunk Check

    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Trunk Check
        uses: trunk-io/trunk-action@v1
        with:
          check-mode: all
