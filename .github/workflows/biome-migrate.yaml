# Workflow summary:
# - Purpose: apply Biome migration updates automatically and propose them through PR.
# - Depends on: none.
# - Trigger:
#   - Scheduled: every day at 06:02 UTC, by GitHub Actions scheduler, to keep Biome migrations current.
#   - Automatic event: on push to main when biome.jsonc or package.json changes, by GitHub Actions, to react to Biome config/dependency updates.
#   - Comment command: on issue comments, by maintainers, to rerun when /rerun is posted on an "Automated biome migrate" issue.
#   - Manual: via workflow_dispatch, by maintainers, to run migration on demand.
# - Steps:
#   - Checkout code and prepare Node.js/pnpm environment with cache.
#   - Install dependencies with retry.
#   - Run Biome migration command and capture output.
#   - Detect repository changes.
#   - Commit changes to automation branch and create/update PR, or close stale PR when no changes exist.
# - Docs:
#   - https://biomejs.dev/guides/upgrade-to-biome-v2/
#   - https://cli.github.com/manual/gh_pr

name: Automated biome migrate

on:
  issue_comment:
    types:
      - created
  push:
    branches:
      - main
    paths:
      - biome.jsonc
      - package.json
  schedule:
    - cron: 2 6 * * *
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  biome-migrate:
    name: biome migrate

    runs-on: ubuntu-22.04
    environment: automated
    timeout-minutes: 10

    if: github.event_name != 'issue_comment' || (startsWith(github.event.issue.title, 'Automated biome migrate') && contains(github.event.comment.body, '/rerun'))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Setup pnpm
        run: corepack enable

      - name: Get pnpm cache directory
        shell: bash
        run: echo "pnpm_cache_dir=$(pnpm store path)" >> ${GITHUB_ENV}

      - name: Use pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.pnpm_cache_dir }}
          key: ubuntu-22.04-x64-node-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ubuntu-22.04-x64-node-

      - name: Install pnpm dependencies
        id: install-pnpm
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile
        continue-on-error: true

      - name: Install pnpm dependencies (retry)
        if: steps.install-pnpm.outcome == 'failure'
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile

      - name: Run biome migrate
        run: |
          set -o pipefail
          pnpm biome:migrate | tee .github/pr_body.log

      - name: Check for changes
        run: |
          if git diff --exit-code; then
            echo "changes=false" >> $GITHUB_ENV
          else
            echo "changes=true" >> $GITHUB_ENV
          fi

      - name: Commit and push to branch
        if: env.changes == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          default_author: github_actions
          message: Automated biome migrate [skip ci]
          new_branch: automated/biome-migrate
          fetch: false
          push: origin automated/biome-migrate --set-upstream --force

      - name: Create pull request
        if: env.changes == 'true'
        run: |-
          if [[ $(gh pr view automated/biome-migrate --json state --jq .state || true) != "OPEN" ]]; then
            gh pr create \
              --head automated/biome-migrate \
              --title "Automated biome migrate [skip ci]" \
              --body-file .github/pr_body.log \
              --label automated \
              --label trunk
          else
            gh pr edit automated/biome-migrate \
              --title "Automated biome migrate [skip ci]" \
              --body-file .github/pr_body.log
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Close pull request
        if: env.changes == 'false'
        run: gh pr list --head automated/biome-migrate --json number --jq '.[].number' | xargs -rn1 gh pr close --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
